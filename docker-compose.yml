services:
  churn-api:
    build: .
    image: customer-churn-prediction:latest
    container_name: churn-api
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: MLflow tracking UI (browse experiments at http://localhost:5000)
  mlflow-ui:
    image: python:3.11-slim
    container_name: churn-mlflow
    working_dir: /mlflow
    volumes:
      - ./:/mlflow
    command: >
      bash -c "pip install --no-cache-dir mlflow &&
               mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db"
    ports:
      - "5000:5000"
    profiles: ["tracking"]
